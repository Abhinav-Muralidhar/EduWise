{% extends 'layout.html' %}
{% block title %}Sign Up - EduWise{% endblock %}

{% block content %}
<div class="w-full flex items-center justify-center py-16 px-4 animate-fade-in-up">
    <div class="themed-card p-8 md:p-12 rounded-xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-primary-blue mb-8">
            Create Your Account
        </h2>
        
        <form method="POST" action="{{ url_for('auth.signup') }}" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div>
                <label for="username" class="block themed-text text-lg font-medium mb-2">Username</label>
                <input type="text" id="username" name="username" required maxlength="50"
                       class="themed-input w-full p-3 border rounded-lg focus:ring focus:ring-primary-blue focus:ring-opacity-50"
                       placeholder="your_username">
            </div>

            <div>
                <label for="email" class="block themed-text text-lg font-medium mb-2">Email</label>
                <input type="email" id="email" name="email" required maxlength="100"
                       class="themed-input w-full p-3 border rounded-lg focus:ring focus:ring-primary-blue focus:ring-opacity-50"
                       placeholder="you@example.com">
            </div>
            
            <div>
                <label for="password" class="block themed-text text-lg font-medium mb-2">Password</label>
                <input type="password" id="password" name="password" required maxlength="100"
                       class="themed-input w-full p-3 border rounded-lg focus:ring focus:ring-primary-blue focus:ring-opacity-50"
                       placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full py-3 bg-accent-green text-white font-semibold rounded-lg shadow-md hover:bg-accent-dark-green transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-accent-green focus:ring-opacity-75">
                Create Account <i class="fas fa-user-plus ml-2"></i>
            </button>
        </form>
        
        <p class="themed-text-secondary text-center mt-6">
            Already have an account? 
            <a href="{{ url_for('auth.login') }}" class="text-primary-blue hover:underline font-medium">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
