{% extends 'layout.html' %}
{% block title %}Login - EduWise{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center pt-24 pb-20 px-6" style="background: var(--surface-page);">
    <div class="w-full max-w-[400px]">
        
        <div class="text-center mb-8 animate-enter">
            <h1 class="text-[28px] font-semibold tracking-tight mb-2" style="color: var(--text-primary);">Login</h1>
            <p class="text-[15px]" style="color: var(--text-secondary);">Welcome back to EduWise.</p>
        </div>

        <div class="studio-card p-8 animate-enter" style="animation-delay: 80ms;">
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                
                <div>
                    <label class="label-caps block mb-2">Email or Username</label>
                    <input type="text" name="username_or_email" required maxlength="100" class="studio-input" placeholder="Enter your email">
                </div>

                <div>
                    <label class="label-caps block mb-2">Password</label>
                    <input type="password" name="password" required maxlength="100" class="studio-input" placeholder="********">
                </div>

                <button type="submit" class="btn-primary w-full mt-2">Log in</button>
            </form>

            <div class="mt-8 pt-6 text-center" style="border-top: 1px solid var(--border);">
                <p class="text-[14px]" style="color: var(--text-muted);">
                    New to EduWise? 
                    <a href="{{ url_for('auth.signup') }}" class="font-semibold hover:underline" style="color: var(--accent);">Create account</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
