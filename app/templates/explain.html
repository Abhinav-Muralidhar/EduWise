{% extends 'layout.html' %}
{% block title %}Explanation: {{ topic }}{% endblock %}

{% block content %}
<div class="min-h-screen pt-24 pb-32" style="background: var(--surface-page);">
    <div class="max-w-[68ch] mx-auto px-6">
        
        <!-- Header -->
        <div class="mb-10 animate-enter">
            <a href="{{ url_for('dashboard.index') }}" class="text-[13px] font-medium flex items-center gap-2 mb-4 transition-colors" style="color: var(--text-muted);">
                <i class="fas fa-arrow-left text-[9px]"></i> Back to dashboard
            </a>
            <h1 class="text-[28px] font-semibold tracking-tight leading-tight" style="color: var(--text-primary);">
                {{ topic }}
            </h1>
        </div>

        <!-- Content -->
        <div class="studio-card p-10 min-h-[500px] animate-enter" style="animation-delay: 80ms;">
            <div id="slides-container" class="space-y-4 text-[15px] leading-[1.8]" style="color: var(--text-secondary);">
                <div class="flex items-center justify-center py-20">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Player Bar -->
<div class="fixed bottom-0 left-0 w-full py-4 px-6 z-40" style="background: var(--surface-card); border-top: 1px solid var(--border);">
    <div class="max-w-[68ch] mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button id="playPauseBtn" class="btn-primary w-10 h-10 rounded-lg !p-0">
                <i id="playIcon" class="fas fa-play text-xs"></i>
                <i id="pauseIcon" class="fas fa-pause text-xs hidden"></i>
            </button>
            <button id="stopBtn" class="w-10 h-10 rounded-lg flex items-center justify-center transition-colors" style="border: 1px solid var(--border); color: var(--text-muted);">
                <i class="fas fa-stop text-xs"></i>
            </button>
        </div>
        
        <div class="flex items-center gap-3">
            <span class="label-caps">Speed</span>
            <select id="rateSelect" class="studio-select !w-auto !py-1.5 !px-3 text-[13px]">
                <option value="0.75">0.7x</option>
                <option value="1" selected>1.0x</option>
                <option value="1.25">1.2x</option>
                <option value="1.5">1.5x</option>
            </select>
        </div>
    </div>
</div>

<script id="explanation-data" type="application/json">
  {{ explanation | tojson | safe }}
</script>
{% endblock %}

{% block scripts %}
<style>
  .line {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    transition: all 0.2s ease;
  }
  .active-line {
    background: var(--accent-surface);
    color: var(--accent);
    font-weight: 500;
  }
</style>

<script>
  const container = document.getElementById('slides-container');
  const explanationRaw = JSON.parse(document.getElementById('explanation-data').textContent);
  const playPauseBtn = document.getElementById('playPauseBtn');
  const playIcon = document.getElementById('playIcon');
  const pauseIcon = document.getElementById('pauseIcon');
  const stopBtn = document.getElementById('stopBtn');
  const rateSelect = document.getElementById('rateSelect');
  
  const lines = explanationRaw.split('\n').filter(line => line.trim() !== '');
  container.innerHTML = ''; 
  lines.forEach((line, index) => {
    const div = document.createElement('div');
    div.classList.add('line');
    div.textContent = line;
    div.id = `line-${index}`;
    container.appendChild(div);
  });

  const synth = window.speechSynthesis;
  let utterance = null;
  let voices = [];
  let selectedVoice = null;
  
  function setupVoices() {
      voices = synth.getVoices();
      selectedVoice = voices.find(voice => /en-US/.test(voice.lang) && /Google|Neural/.test(voice.name));
      if (!selectedVoice) selectedVoice = voices.find(voice => /en-US/.test(voice.lang));
  }

  synth.onvoiceschanged = setupVoices;
  setupVoices();

  let currentIndex = 0;
  let speechState = 'idle';

  function highlightLine(index) {
    document.querySelectorAll('.line').forEach(el => el.classList.remove('active-line'));
    if (index < 0) return;
    const active = document.getElementById(`line-${index}`);
    if (active) {
      active.classList.add('active-line');
      active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function playPause() {
    if (speechState === 'idle') startSpeaking();
    else if (speechState === 'playing') {
      synth.pause();
      speechState = 'paused';
      updateButtonUI(false);
    } else if (speechState === 'paused') {
      synth.resume();
      speechState = 'playing';
      updateButtonUI(true);
    }
  }

  function startSpeaking() {
      if (synth.speaking) synth.cancel();
      speechState = 'playing';
      updateButtonUI(true);
      speakLine(currentIndex);
  }

  function stopSpeaking() {
    synth.cancel();
    speechState = 'idle';
    currentIndex = 0;
    updateButtonUI(false);
    highlightLine(-1);
  }
  
  function speakLine(index) {
    if (index >= lines.length) {
      stopSpeaking();
      return;
    }
    utterance = new SpeechSynthesisUtterance(lines[index]);
    if (selectedVoice) utterance.voice = selectedVoice;
    utterance.rate = parseFloat(rateSelect.value) || 1;
    utterance.onstart = () => highlightLine(index);
    utterance.onend = () => {
      currentIndex++;
      if (speechState === 'playing') speakLine(currentIndex);
    };
    synth.speak(utterance);
  }

  function updateButtonUI(isPlaying) {
      if (isPlaying) {
          playIcon.classList.add('hidden');
          pauseIcon.classList.remove('hidden');
      } else {
          playIcon.classList.remove('hidden');
          pauseIcon.classList.add('hidden');
      }
  }

  playPauseBtn.addEventListener('click', playPause);
  stopBtn.addEventListener('click', stopSpeaking);
  rateSelect.addEventListener('change', () => {
      if (speechState === 'playing' || speechState === 'paused') startSpeaking();
  });
  window.addEventListener('beforeunload', () => synth.cancel());
</script>
{% endblock %}
