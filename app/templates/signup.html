{% extends 'layout.html' %}
{% block title %}Sign Up - EduWise{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center pt-24 pb-20 px-6" style="background: var(--surface-page);">
    <div class="w-full max-w-[400px]">
        
        <div class="text-center mb-8 animate-enter">
            <h1 class="text-[28px] font-semibold tracking-tight mb-2" style="color: var(--text-primary);">Create Account</h1>
            <p class="text-[15px]" style="color: var(--text-secondary);">Join over 1,000 learners today.</p>
        </div>

        <div class="studio-card p-8 animate-enter" style="animation-delay: 80ms;">
            <form method="POST" action="{{ url_for('auth.signup') }}" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                
                <div>
                    <label class="label-caps block mb-2">Username</label>
                    <input type="text" name="username" required maxlength="50" class="studio-input" placeholder="Choose a username">
                </div>

                <div>
                    <label class="label-caps block mb-2">Email</label>
                    <input type="email" name="email" required maxlength="100" class="studio-input" placeholder="you@example.com">
                </div>

                <div>
                    <label class="label-caps block mb-2">Password</label>
                    <input type="password" name="password" required maxlength="100" class="studio-input" placeholder="********">
                </div>

                <div class="flex items-center gap-3">
                    <input type="checkbox" id="terms" required class="w-4 h-4 rounded cursor-pointer" style="accent-color: var(--accent);">
                    <label for="terms" class="text-[12px]" style="color: var(--text-muted);">I agree to the <a href="#" class="hover:underline font-medium" style="color: var(--accent);">Terms of Service</a></label>
                </div>

                <button type="submit" class="btn-primary w-full mt-2">Join EduWise</button>
            </form>

            <div class="mt-8 pt-6 text-center" style="border-top: 1px solid var(--border);">
                <p class="text-[14px]" style="color: var(--text-muted);">
                    Already a member? 
                    <a href="{{ url_for('auth.login') }}" class="font-semibold hover:underline" style="color: var(--accent);">Log in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
